<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinZee | Financial Terminal</title>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}
:root {
--bg-primary: #0a0a0a;
--bg-secondary: #111111;
--bg-tertiary: #1a1a1a;
--bg-hover: #252525;
--border-color: #2a2a2a;
--text-primary: #e0e0e0;
--text-secondary: #888888;
--accent-blue: #4a9eff;
--accent-cyan: #00d4ff;
--accent-warm: #ffb347;
--accent-amber: #ffcc00;
--positive: #00c853;
--negative: #ff3d00;
--neutral: #888888;
--font-mono: 'Courier New', Courier, monospace;
}
body {
background-color: var(--bg-primary);
color: var(--text-primary);
font-family: var(--font-mono);
font-size: 12px;
overflow: hidden;
height: 100vh;
}
/* Ticker Tape */
.ticker-tape {
height: 32px;
background: var(--bg-secondary);
border-bottom: 1px solid var(--border-color);
display: flex;
align-items: center;
overflow: hidden;
white-space: nowrap;
position: relative;
}
.ticker-content {
display: flex;
animation: scroll 40s linear infinite;
}
.ticker-item {
display: inline-flex;
align-items: center;
padding: 0 24px;
border-right: 1px solid var(--border-color);
}
.ticker-symbol {
color: var(--accent-cyan);
font-weight: bold;
margin-right: 8px;
}
.ticker-price {
color: var(--text-primary);
margin-right: 6px;
}
.ticker-change {
font-size: 11px;
}
.ticker-change.positive { color: var(--positive); }
.ticker-change.negative { color: var(--negative); }
@keyframes scroll {
0% { transform: translateX(0); }
100% { transform: translateX(-50%); }
}
/* Main Layout */
.main-container {
display: flex;
height: calc(100vh - 32px);
}
/* Control Panel (1/4) */
.control-panel {
width: 25%;
background: var(--bg-secondary);
border-right: 1px solid var(--border-color);
display: flex;
flex-direction: column;
overflow: hidden;
}
.panel-header {
padding: 12px;
background: var(--bg-tertiary);
border-bottom: 1px solid var(--border-color);
font-weight: bold;
color: var(--accent-warm);
text-transform: uppercase;
letter-spacing: 1px;
display: flex;
justify-content: space-between;
align-items: center;
}
.search-box {
padding: 8px 12px;
background: var(--bg-primary);
border-bottom: 1px solid var(--border-color);
}
.search-box input {
width: 100%;
background: var(--bg-secondary);
border: 1px solid var(--border-color);
color: var(--text-primary);
padding: 6px 10px;
font-family: var(--font-mono);
font-size: 12px;
outline: none;
}
.search-box input:focus {
border-color: var(--accent-blue);
}
.sections-container {
flex: 1;
overflow-y: auto;
overflow-x: hidden;
}
.sections-container::-webkit-scrollbar {
width: 6px;
}
.sections-container::-webkit-scrollbar-track {
background: var(--bg-secondary);
}
.sections-container::-webkit-scrollbar-thumb {
background: var(--border-color);
}
/* Accordion Sections */
.section {
border-bottom: 1px solid var(--border-color);
}
.section-header {
padding: 10px 12px;
background: var(--bg-tertiary);
cursor: pointer;
display: flex;
justify-content: space-between;
align-items: center;
transition: background 0.2s;
user-select: none;
}
.section-header:hover {
background: var(--bg-hover);
}
.section-header.active {
background: var(--accent-warm);
color: #000;
}
.section-title {
font-weight: bold;
text-transform: uppercase;
letter-spacing: 0.5px;
}
.section-arrow {
transition: transform 0.2s;
font-size: 10px;
}
.section-header.active .section-arrow {
transform: rotate(90deg);
}
.section-content {
display: none;
background: var(--bg-primary);
}
.section-content.active {
display: block;
}
/* Data Tables */
.data-table {
width: 100%;
border-collapse: collapse;
font-size: 11px;
}
.data-table th {
background: var(--bg-secondary);
color: var(--text-secondary);
padding: 6px 8px;
text-align: left;
font-weight: normal;
text-transform: uppercase;
font-size: 10px;
border-bottom: 1px solid var(--border-color);
position: sticky;
top: 0;
z-index: 10;
}
.data-table td {
padding: 6px 8px;
border-bottom: 1px solid var(--border-color);
cursor: pointer;
transition: background 0.1s;
}
.data-table tr:hover td {
background: var(--bg-hover);
}
.data-table tr.selected td {
background: rgba(74, 158, 255, 0.15);
border-left: 2px solid var(--accent-blue);
}
.ticker-cell {
color: var(--accent-cyan);
font-weight: bold;
}
.price-cell {
font-family: var(--font-mono);
text-align: right;
}
.change-cell {
text-align: right;
font-weight: bold;
}
.change-positive { color: var(--positive); }
.change-negative { color: var(--negative); }
.metric-cell {
text-align: right;
color: var(--text-secondary);
}
/* Loading State */
.loading-row td {
text-align: center;
padding: 20px;
color: var(--text-secondary);
}
/* Ticker Detail Panel (3/4) */
.ticker-detail {
width: 75%;
display: flex;
flex-direction: column;
background: var(--bg-primary);
}
.detail-header {
height: 70px;
background: var(--bg-secondary);
border-bottom: 1px solid var(--border-color);
display: flex;
align-items: center;
padding: 0 20px;
justify-content: space-between;
}
.ticker-info {
display: flex;
align-items: center;
gap: 20px;
}
.ticker-main {
font-size: 28px;
font-weight: bold;
color: var(--accent-cyan);
}
.ticker-name {
color: var(--text-secondary);
font-size: 12px;
max-width: 350px;
overflow: hidden;
text-overflow: ellipsis;
white-space: nowrap;
display: flex;
gap: 8px;
}
.ticker-sector {
color: var(--accent-warm);
font-size: 10px;
text-transform: uppercase;
}
.ticker-stats {
display: flex;
gap: 30px;
}
.stat-item {
text-align: right;
}
.stat-label {
font-size: 10px;
color: var(--text-secondary);
text-transform: uppercase;
margin-bottom: 2px;
}
.stat-value {
font-size: 20px;
font-weight: bold;
color: var(--text-primary);
font-family: var(--font-mono);
}
.stat-value.positive { color: var(--positive); }
.stat-value.negative { color: var(--negative); }
/* Grid Layout */
.detail-grid {
flex: 1;
display: flex;
flex-direction: column;
overflow: hidden;
}
.grid-top {
flex: 1;
display: flex;
height: 80%;
}
.grid1 {
flex: 2.2;
border-right: 1px solid var(--border-color);
position: relative;
display: flex;
flex-direction: column;
}
.grid2 {
flex: 0.9;
background: var(--bg-secondary);
overflow-y: auto;
padding: 8px;
}
.grid3 {
height: 20%;
background: var(--bg-secondary);
border-top: 1px solid var(--border-color);
overflow-y: auto;
}
/* Chart Container */
.chart-container {
width: 100%;
flex: 1;
position: relative;
}
/* Enhanced Financial Data Panel */
.financial-panel {
padding: 0;
}
.metric-row {
display: flex;
justify-content: space-between;
align-items: center;
padding: 10px 12px;
border-bottom: 1px solid var(--border-color);
background: var(--bg-primary);
transition: background 0.2s;
}
.metric-row:hover {
background: var(--bg-hover);
}
.metric-label {
color: var(--text-secondary);
font-size: 11px;
text-transform: uppercase;
letter-spacing: 0.5px;
}
.metric-value {
font-family: var(--font-mono);
font-weight: bold;
font-size: 12px;
color: var(--text-primary);
}
.metric-value.positive { color: var(--positive); }
.metric-value.negative { color: var(--negative); }
.metric-value.accent { color: var(--accent-warm); }
/* Section headers in financial panel */
.fin-section-header {
background: var(--bg-tertiary);
padding: 8px 12px;
font-weight: bold;
color: var(--accent-warm);
border-bottom: 1px solid var(--border-color);
text-transform: uppercase;
font-size: 11px;
letter-spacing: 0.5px;
position: sticky;
top: 0;
z-index: 10;
}
/* Condensed metrics table */
.metrics-table {
width: 100%;
border-collapse: collapse;
font-size: 11px;
margin-bottom: 12px;
}
.metrics-table td {
padding: 4px 8px;
border-bottom: 1px solid var(--border-color);
}
.metrics-table td:first-child {
color: var(--text-secondary);
text-transform: uppercase;
font-size: 10px;
width: 55%;
}
.metrics-table td:last-child {
font-family: var(--font-mono);
font-weight: bold;
text-align: right;
color: var(--text-primary);
}
/* Mini cards row */
.mini-cards {
display: flex;
gap: 6px;
margin: 8px 0;
}
.mini-card {
flex: 1;
background: var(--bg-tertiary);
border: 1px solid var(--border-color);
border-radius: 4px;
padding: 6px 8px;
text-align: center;
}
.mini-card-label {
font-size: 9px;
color: var(--text-secondary);
text-transform: uppercase;
margin-bottom: 2px;
}
.mini-card-value {
font-family: var(--font-mono);
font-weight: bold;
font-size: 11px;
color: var(--text-primary);
}
/* Main info inline row */
.main-info-row {
display: flex;
justify-content: space-between;
align-items: center;
padding: 6px 0;
border-bottom: 1px solid var(--border-color);
margin-bottom: 8px;
}
.main-info-item {
display: flex;
flex-direction: column;
}
.main-info-label {
font-size: 9px;
color: var(--text-secondary);
text-transform: uppercase;
}
.main-info-value {
font-family: var(--font-mono);
font-weight: bold;
font-size: 12px;
color: var(--accent-cyan);
}
/* Progress bars for price targets */
.pt-container {
width: 100%;
margin-top: 4px;
}
.pt-bar-bg {
width: 100%;
height: 6px;
background: var(--bg-secondary);
border-radius: 3px;
overflow: hidden;
position: relative;
}
.pt-bar-fill {
height: 100%;
border-radius: 3px;
transition: width 0.3s ease;
}
.pt-labels {
display: flex;
justify-content: space-between;
font-size: 9px;
color: var(--text-secondary);
margin-top: 2px;
}
.pt-current {
position: absolute;
top: -2px;
width: 2px;
height: 10px;
background: var(--text-primary);
z-index: 5;
}
/* Recommendation badge */
.rec-badge {
display: inline-block;
padding: 2px 8px;
border-radius: 3px;
font-size: 10px;
font-weight: bold;
text-transform: uppercase;
letter-spacing: 0.5px;
}
.rec-strong_buy { background: rgba(0, 200, 83, 0.2); color: var(--positive); border: 1px solid var(--positive); }
.rec-buy { background: rgba(0, 200, 83, 0.15); color: var(--positive); }
.rec-hold { background: rgba(255, 179, 71, 0.2); color: var(--accent-warm); border: 1px solid var(--accent-warm); }
.rec-sell { background: rgba(255, 61, 0, 0.15); color: var(--negative); }
.rec-strong_sell { background: rgba(255, 61, 0, 0.2); color: var(--negative); border: 1px solid var(--negative); }
/* Dynamic background colors based on values */
.bg-positive { background: linear-gradient(90deg, rgba(0, 200, 83, 0.1) 0%, transparent 100%); }
.bg-negative { background: linear-gradient(90deg, rgba(255, 61, 0, 0.1) 0%, transparent 100%); }
.bg-neutral { background: var(--bg-primary); }
/* News Section */
.news-container {
padding: 12px;
}
.news-header {
font-weight: bold;
color: var(--accent-warm);
margin-bottom: 8px;
text-transform: uppercase;
font-size: 11px;
position: sticky;
top: 0;
background: var(--bg-secondary);
padding: 8px 0;
border-bottom: 1px solid var(--border-color);
}
.news-item {
padding: 10px 12px;
border-bottom: 1px solid var(--border-color);
cursor: pointer;
transition: background 0.2s;
}
.news-item:hover {
background: var(--bg-hover);
}
.news-title {
color: var(--text-primary);
font-weight: bold;
margin-bottom: 4px;
line-height: 1.4;
font-size: 12px;
}
.news-summary {
color: var(--text-secondary);
font-size: 11px;
margin-bottom: 4px;
line-height: 1.3;
display: -webkit-box;
-webkit-line-clamp: 2;
-webkit-box-orient: vertical;
overflow: hidden;
}
.news-meta {
color: var(--text-secondary);
font-size: 10px;
display: flex;
gap: 12px;
}
.news-source {
color: var(--accent-cyan);
}
/* Scrollbars */
::-webkit-scrollbar {
width: 8px;
height: 8px;
}
::-webkit-scrollbar-track {
background: var(--bg-secondary);
}
::-webkit-scrollbar-thumb {
background: var(--border-color);
border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover {
background: var(--text-secondary);
}
/* Utility */
.text-right { text-align: right; }
.text-center { text-align: center; }
.hidden { display: none; }
.spinner {
display: inline-block;
width: 12px;
height: 12px;
border: 2px solid var(--border-color);
border-top-color: var(--accent-blue);
border-radius: 50%;
animation: spin 0.8s linear infinite;
}
@keyframes spin {
to { transform: rotate(360deg); }
}
.error-message {
color: var(--negative);
padding: 20px;
text-align: center;
}
</style>
</head>
<body>
<!-- Ticker Tape -->
<div class="ticker-tape" id="tickerTape">
<div class="ticker-content" id="tickerContent">
<span style="padding: 0 20px; color: var(--text-secondary);">Loading market data...</span>
</div>
</div>
<div class="main-container">
<!-- Control Panel -->
<div class="control-panel">
<div class="panel-header">
<span>FinZee Terminal</span>
<span style="font-size: 10px; color: var(--text-secondary);">LIVE</span>
</div>
<div class="search-box">
<input type="text" id="searchInput" placeholder="Search ticker + Enter (e.g. NVDA)...">
</div>
<div class="sections-container" id="sectionsContainer">
<!-- Sections populated by JS -->
</div>
</div>
<!-- Ticker Detail -->
<div class="ticker-detail">
<div class="detail-header" id="detailHeader">
<div class="ticker-info">
<div>
<div class="ticker-main" id="mainTicker">--</div>
<div class="ticker-name" id="tickerName">Select a ticker</div>
</div>
</div>
<div class="ticker-stats">
<div class="stat-item">
<div class="stat-label">Last Price</div>
<div class="stat-value" id="mainPrice">--</div>
</div>
<div class="stat-item">
<div class="stat-label">Change</div>
<div class="stat-value" id="mainChange">--</div>
</div>
<div class="stat-item">
<div class="stat-label">Market Cap</div>
<div class="stat-value" id="mainMarketCap">--</div>
</div>
</div>
</div>
<div class="detail-grid">
<div class="grid-top">
<div class="grid1">
<div class="tradingview-widget-container" id="tradingviewChart" style="height: 100%;">
<div style="display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-secondary);">
Select a ticker to view chart
</div>
</div>
</div>
<div class="grid2" id="financialData">
<div style="padding: 20px; color: var(--text-secondary); text-align: center;">
Financial data will appear here
</div>
</div>
</div>
<div class="grid3" id="newsContainer">
<div class="news-container">
<div class="news-header">Recent News</div>
<div style="padding: 20px; color: var(--text-secondary); text-align: center;">
News will appear here
</div>
</div>
</div>
</div>
</div>
</div>
<script>
// State Management - ONLY Market Outlook loaded initially
const state = {
cache: new Map(),
data: {},
selectedTicker: null,
loadedSections: new Set(),
watchlist: new Set(),
sections: {
'Watchlist': {
expanded: true,
tickers: [],
isWatchlist: true,
loaded: true
},
'Market Outlook': {
expanded: true,
tickers: ['SPY', 'QQQ', 'IWM', 'DIA', 'VIX'],
loaded: false
},
'US Indices': {
expanded: false,
tickers: ['^GSPC', '^DJI', '^IXIC', '^RUT', '^VIX', '^TNX', '^FVX', '^TYX'],
loaded: false
},
'World Indices': {
expanded: false,
tickers: ['^N225', '^FTSE', '^GDAXI', '^FCHI', '^HSI', '000001.SS', '^AXJO', '^KS11'],
loaded: false
},
'Sectors': {
expanded: false,
tickers: ['XLF', 'XLK', 'XLE', 'XLV', 'XLI', 'XLP', 'XLY', 'XLU', 'XLRE', 'XLC', 'XLB'],
loaded: false
},
'Global Assets': {
expanded: false,
tickers: ['GLD', 'SLV', 'USO', 'UNG', 'DBA', 'UUP', 'FXE', 'FXY', 'FXB'],
loaded: false
},
'Innovation ETFs': {
expanded: false,
tickers: ['ARKK', 'ARKQ', 'ARKW', 'ARKG', 'ARKF', 'SMH', 'BOTZ', 'LIT', 'ICLN', 'QCLN'],
loaded: false
},
'Tech Stocks': {
expanded: false,
tickers: ['NVDA', 'TSLA', 'AVGO', 'AMD', 'CRM', 'PLTR', 'INTC', 'SNOW', 'COIN', 'SQ', 'SOFI', 'RKLB', 'ASTS', 'AI', 'PATH', 'MSTR', 'MARA', 'RIOT', 'HOOD', 'NET'],
loaded: false
},
'Crypto': {
expanded: false,
tickers: ['BTC-USD', 'ETH-USD', 'SOL-USD', 'ADA-USD', 'DOT-USD', 'LINK-USD', 'MATIC-USD', 'UNI-USD', 'AAVE-USD', 'CRV-USD'],
loaded: false
},
'Bonds & Rates': {
expanded: false,
tickers: ['TLT', 'IEF', 'SHY', 'HYG', 'LQD', 'BND', 'AGG', 'TIP', 'MUB', 'EMB'],
loaded: false
}
}
};
const API_BASE = 'https://mini-finapi.vercel.app/api';
// Helper to parse percentage strings
function parsePercent(str) {
if (!str) return 0;
if (typeof str === 'number') return str;
return parseFloat(str.replace('%', '').trim());
}
// Helper to get nested value safely
function getVal(obj, path, defaultVal = '--') {
const keys = path.split('.');
let val = obj;
for (const key of keys) {
if (val && val[key] !== undefined && val[key] !== null) {
val = val[key];
} else {
return defaultVal;
}
}
return val !== null && val !== undefined ? val : defaultVal;
}
// Determine background class based on value
function getValueBg(value, type = 'change') {
if (type === 'change') {
const num = parsePercent(value);
if (num > 0) return 'bg-positive';
if (num < 0) return 'bg-negative';
return 'bg-neutral';
}
return 'bg-neutral';
}
// Cache utility
async function fetchWithCache(url) {
if (state.cache.has(url)) return state.cache.get(url);
try {
const response = await fetch(url);
if (!response.ok) throw new Error(`HTTP ${response.status}`);
const data = await response.json();
state.cache.set(url, data);
setTimeout(() => state.cache.delete(url), 60000);
return data;
} catch (e) {
console.error('Fetch failed:', e);
throw e;
}
}
// Initialize - ONLY load Market Outlook initially
async function init() {
try {
await loadSection('Market Outlook');
renderTickerTape();
renderSections();
const firstTicker = state.sections['Market Outlook'].tickers[0];
if (firstTicker && state.data[firstTicker]) {
selectTicker(firstTicker);
}
} catch (e) {
console.error('Init failed:', e);
document.getElementById('tickerContent').innerHTML = '<span style="padding: 0 20px; color: var(--negative);">Failed to load data</span>';
}
}
// Load specific section
async function loadSection(sectionName) {
const section = state.sections[sectionName];
if (!section || section.loaded || section.isWatchlist) return;
if (!section.tickers || section.tickers.length === 0) {
section.loaded = true;
return;
}
try {
const data = await fetchWithCache(`${API_BASE}/ticker?ticker=${section.tickers.join(',')}`);
if (Array.isArray(data)) {
data.forEach(d => {
if (d.ticker) state.data[d.ticker] = d;
});
section.loaded = true;
state.loadedSections.add(sectionName);
}
} catch (e) {
console.error(`Failed to load section ${sectionName}:`, e);
}
}
// Load single ticker (for watchlist)
async function loadSingleTicker(ticker) {
if (state.data[ticker]) return state.data[ticker];
try {
const data = await fetchWithCache(`${API_BASE}/ticker?ticker=${ticker}`);
if (Array.isArray(data) && data[0]) {
state.data[ticker] = data[0];
return data[0];
}
} catch (e) {
console.error(`Failed to load ticker ${ticker}:`, e);
return null;
}
}
// Render Ticker Tape - only from loaded data
function renderTickerTape() {
const tapeTickers = ['SPY', 'QQQ', 'IWM', 'DIA', 'GLD', 'TLT', 'VIX', 'AAPL', 'TSLA', 'NVDA'];
const content = document.getElementById('tickerContent');
const items = tapeTickers.map(ticker => {
const data = state.data[ticker];
if (!data) return '';
const price = getVal(data, 'main_info.currentPrice', 0);
const changeStr = getVal(data, 'main_info.oneDayChange', '0%');
const change = parsePercent(changeStr);
const changeClass = change >= 0 ? 'positive' : 'negative';
const changeDisp = change >= 0 ? `+${change.toFixed(2)}%` : `${change.toFixed(2)}%`;
return `
<div class="ticker-item">
<span class="ticker-symbol">${ticker}</span>
<span class="ticker-price">${typeof price === 'number' ? price.toFixed(2) : price}</span>
<span class="ticker-change ${changeClass}">${changeDisp}</span>
</div>
`;
}).filter(Boolean).join('');
if (items) {
content.innerHTML = items + items;
} else {
content.innerHTML = '<span style="padding: 0 20px; color: var(--text-secondary);">Loading...</span>';
}
}
// Render Sections
function renderSections() {
const container = document.getElementById('sectionsContainer');
container.innerHTML = '';
Object.entries(state.sections).forEach(([name, section]) => {
const sectionEl = document.createElement('div');
sectionEl.className = 'section';
const tickerCount = section.isWatchlist ? state.watchlist.size : section.tickers.length;
sectionEl.innerHTML = `
<div class="section-header ${section.expanded ? 'active' : ''}" onclick="toggleSection('${name}')">
<span class="section-title">${name} ${section.isWatchlist ? `(${tickerCount})` : ''}</span>
<span class="section-arrow">▶</span>
</div>
<div class="section-content ${section.expanded ? 'active' : ''}" id="section-${name.replace(/\s+/g, '-')}">
${section.isWatchlist && tickerCount === 0 ?
'<div style="padding: 20px; text-align: center; color: var(--text-secondary); font-size: 11px;">Type a ticker above and press Enter to add</div>' :
renderTickerTable(section.isWatchlist ? Array.from(state.watchlist) : section.tickers, name)
}
</div>
`;
container.appendChild(sectionEl);
});
}
// Render Ticker Table
function renderTickerTable(tickers, sectionName) {
if (!tickers || tickers.length === 0) {
return '<div style="padding: 20px; text-align: center; color: var(--text-secondary);">No tickers</div>';
}
const rows = tickers.map(ticker => {
const data = state.data[ticker];
if (!data) {
return `<tr onclick="selectTicker('${ticker}')" id="row-${ticker}">
<td class="ticker-cell">${ticker}</td>
<td colspan="5" class="text-center" style="color: var(--text-secondary);">
<span class="spinner"></span> Loading...
</td>
</tr>`;
}
const main = data.main_info || {};
const trading = data.trading_info || {};
const pricePerf = data.price_performance || {};
const price = main.currentPrice || 0;
const changeStr = main.oneDayChange || '0%';
const change = parsePercent(changeStr);
const change52wStr = main.fiftyTwoWeekChange || pricePerf['52WeekChange'] || '0%';
const change52w = parsePercent(change52wStr);
const dma50 = trading.change_from_50DMA || '--';
const dma200 = trading.change_from_200DMA || '--';
const isSelected = state.selectedTicker === ticker ? 'selected' : '';
return `
<tr onclick="selectTicker('${ticker}')" id="row-${ticker}" class="${isSelected}">
<td class="ticker-cell">${ticker}</td>
<td class="price-cell">${price ? price.toFixed(2) : '--'}</td>
<td class="change-cell ${change >= 0 ? 'change-positive' : 'change-negative'}">
${change >= 0 ? '+' : ''}${change.toFixed(2)}%
</td>
<td class="metric-cell ${change52w >= 0 ? 'change-positive' : 'change-negative'}">
${change52w ? (change52w >= 0 ? '+' : '') + change52w.toFixed(1) + '%' : '--'}
</td>
<td class="metric-cell">${dma50}</td>
<td class="metric-cell">${dma200}</td>
</tr>
`;
}).join('');
return `
<table class="data-table">
<thead>
<tr>
<th>Ticker</th>
<th class="text-right">Price</th>
<th class="text-right">Day Chg</th>
<th class="text-right">52W Chg</th>
<th class="text-right">50DMA</th>
<th class="text-right">200DMA</th>
</tr>
</thead>
<tbody>${rows}</tbody>
</table>
`;
}
// Toggle Section
window.toggleSection = async function(name) {
const section = state.sections[name];
if (!section) return;
section.expanded = !section.expanded;
if (section.expanded && !section.loaded && !section.isWatchlist) {
await loadSection(name);
}
renderSections();
};
// Select Ticker
window.selectTicker = async function(ticker) {
state.selectedTicker = ticker;
document.querySelectorAll('.data-table tr').forEach(tr => tr.classList.remove('selected'));
const row = document.getElementById(`row-${ticker}`);
if (row) row.classList.add('selected');
if (!state.data[ticker]) {
const data = await loadSingleTicker(ticker);
if (data) {
renderSections();
}
}
const data = state.data[ticker];
if (data) {
updateDetailHeader(data);
updateChart(ticker);
updateFinancialData(data);
updateNews(data);
}
};
// Update Detail Header - WITH SECTOR/INDUSTRY
function updateDetailHeader(data) {
const main = data.main_info || {};
const company = data.company_info || {};
document.getElementById('mainTicker').textContent = data.ticker || '--';
// Build ticker name with sector/industry
const sector = company.sector || main.sector || '';
const industry = company.industry || main.industry || '';
const sectorDisplay = sector || industry ? `• ${sector}${industry && sector ? ' / ' : ''}${industry}` : '';
document.getElementById('tickerName').innerHTML = `
<span>${main.shortName || data.shortName || '--'}</span>
${sectorDisplay ? `<span class="ticker-sector">${sectorDisplay}</span>` : ''}
`;
const price = main.currentPrice || 0;
document.getElementById('mainPrice').textContent = price ? price.toFixed(2) : '--';
const changeStr = main.oneDayChange || '0%';
const change = parsePercent(changeStr);
const changeEl = document.getElementById('mainChange');
changeEl.textContent = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';
changeEl.className = 'stat-value ' + (change >= 0 ? 'positive' : 'negative');
const mcap = main.marketCap || '--';
document.getElementById('mainMarketCap').textContent = mcap;
}
// Update TradingView Chart
function updateChart(ticker) {
const container = document.getElementById('tradingviewChart');
container.innerHTML = '';
let symbol = ticker;
if (ticker.includes('-USD')) {
symbol = `COINBASE:${ticker.replace('-USD', 'USD')}`;
} else if (ticker.startsWith('^')) {
symbol = `INDEX:${ticker.substring(1)}`;
} else {
symbol = `NASDAQ:${ticker}`;
}
const script = document.createElement('script');
script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
script.async = true;
script.innerHTML = JSON.stringify({
"allow_symbol_change": true,
"calendar": false,
"details": false,
"hide_side_toolbar": false,
"hide_top_toolbar": false,
"hide_legend": false,
"hide_volume": false,
"hotlist": false,
"interval": "D",
"locale": "en",
"save_image": true,
"style": "1",
"symbol": symbol,
"theme": "dark",
"timezone": "Etc/UTC",
"backgroundColor": "#0a0a0a",
"gridColor": "rgba(42, 42, 42, 0.5)",
"watchlist": [],
"withdateranges": true,
"compareSymbols": [],
"studies": ["Volume@tv-basicstudies"],
"autosize": true
});
container.appendChild(script);
}
// Update Financial Data Panel - CONDENSED LAYOUT
function updateFinancialData(data) {
const main = data.main_info || {};
const pricePerf = data.price_performance || {};
const trading = data.trading_info || {};
const valuation = data.valuation || {};
const ratios = data.ratios || {};
const returns = data.returns || {};
const risk = data.risk || {};
const dividends = data.dividends || {};
const earnings = data.earnings || {};
const growth = data.growth || {};
const pt = data.price_targets || {};
const currentPrice = main.currentPrice || pricePerf.currentPrice || 0;
// Price Targets section (kept separate, not in table)
const ptLow = pt.targetLowPrice;
const ptHigh = pt.targetHighPrice;
const ptMean = pt.targetMeanPrice;
let ptPercent = 50;
if (ptLow && ptHigh && currentPrice) {
ptPercent = ((currentPrice - ptLow) / (ptHigh - ptLow)) * 100;
ptPercent = Math.max(0, Math.min(100, ptPercent));
}
const recKey = main.recommendation || pt.recommendationKey;
let recClass = 'rec-hold';
let recText = 'HOLD';
if (recKey) {
if (recKey.includes('strong_buy')) { recClass = 'rec-strong_buy'; recText = 'STRONG BUY'; }
else if (recKey.includes('buy')) { recClass = 'rec-buy'; recText = 'BUY'; }
else if (recKey.includes('strong_sell')) { recClass = 'rec-strong_sell'; recText = 'STRONG SELL'; }
else if (recKey.includes('sell')) { recClass = 'rec-sell'; recText = 'SELL'; }
}
// MAIN INFO section data
const price = currentPrice || '--';
const marketCap = main.marketCap || valuation.marketCap || '--';
const pe = main.PE || ratios.trailingPE || '--';
const fwdPe = main.forwardPE || ratios.forwardPE || '--';
const peg = ratios.pegRatio || growth.pegRatio || growth.trailingPegRatio || '--';
// Financials table data
const revenue = main.totalRevenue || valuation.totalRevenue || '--';
const netIncome = main.netIncome || returns.netIncome || '--';
const revGrowth = growth.revenueGrowth || '--';
const earnGrowth = growth.earningsGrowth || '--';
// Condensed metrics table rows (excluding Price Targets)
const metricsRows = [
{ label: 'Open', value: pricePerf.open ? '$' + pricePerf.open.toFixed(2) : '--' },
{ label: 'Day Range', value: `${pricePerf.dayLow?.toFixed(2) || '--'} - ${pricePerf.dayHigh?.toFixed(2) || '--'}` },
{ label: '52W Range', value: `${pricePerf.fiftyTwoWeekLow?.toFixed(2) || '--'} - ${pricePerf.fiftyTwoWeekHigh?.toFixed(2) || '--'}` },
{ label: '50 DMA Dist', value: trading.change_from_50DMA || '--', class: parsePercent(trading.change_from_50DMA) >= 0 ? 'positive' : 'negative' },
{ label: '200 DMA Dist', value: trading.change_from_200DMA || '--', class: parsePercent(trading.change_from_200DMA) >= 0 ? 'positive' : 'negative' },
{ label: 'Enterprise Value', value: valuation.enterpriseValue || '--' },
{ label: 'Price/Book', value: main.priceToBook || valuation.priceToBook || ratios.priceToBook || '--' },
{ label: 'Price/Sales', value: main.PS || ratios.priceToSalesTrailing12Months || '--' },
{ label: 'Volume', value: trading.volume ? (trading.volume/1e6).toFixed(2)+'M' : '--' },
{ label: 'Beta', value: risk?.beta || risk?.beta3Year || '--' },
{ label: 'ROE', value: returns.returnOnEquity || ratios.returnOnEquity || '--' },
{ label: 'Profit Margin', value: returns.profitMargins || ratios.profitMargins || '--' },
{ label: 'Div Yield', value: dividends.dividendYield || '--' },
].filter(row => row.value !== '--' || row.label).map(row => `
<tr>
<td>${row.label}</td>
<td class="${row.class || ''}">${row.value}</td>
</tr>
`).join('');
const html = `
<div class="financial-panel">
<!-- Price Targets (kept separate) -->
<div class="fin-section-header">Price Targets & Rating</div>
<div class="metric-row">
<span class="metric-label">Analyst Rating</span>
<span class="metric-value"><span class="rec-badge ${recClass}">${recText}</span></span>
</div>
${ptLow && ptHigh ? `
<div class="metric-row" style="flex-direction: column; align-items: stretch; padding: 8px 12px;">
<div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
<span class="metric-label">Target Range</span>
<span class="metric-value accent">$${ptLow.toFixed(2)} - $${ptHigh.toFixed(2)}</span>
</div>
<div class="pt-container">
<div class="pt-bar-bg">
<div class="pt-bar-fill" style="width: ${ptPercent}%; background: linear-gradient(90deg, var(--negative) 0%, var(--accent-warm) 50%, var(--positive) 100%);"></div>
<div class="pt-current" style="left: ${ptPercent}%;"></div>
</div>
<div class="pt-labels">
<span>$${ptLow.toFixed(2)}</span>
<span style="color: var(--accent-cyan); font-weight: bold;">$${currentPrice.toFixed(2)}</span>
<span>$${ptHigh.toFixed(2)}</span>
</div>
</div>
${ptMean ? `<div style="text-align: center; margin-top: 4px; font-size: 9px; color: var(--text-secondary);">Mean: $${ptMean.toFixed(2)} (${((ptMean/currentPrice-1)*100).toFixed(1)}%)</div>` : ''}
</div>
` : ''}
${pt.numberOfAnalystOpinions ? `
<div class="metric-row">
<span class="metric-label">Analyst Coverage</span>
<span class="metric-value">${pt.numberOfAnalystOpinions} firms</span>
</div>
` : ''}
<!-- MAIN INFO Section -->
<div class="fin-section-header" style="margin-top: 12px;">MAIN INFO</div>
<!-- Price + Market Cap inline -->
<div class="main-info-row">
<div class="main-info-item">
<span class="main-info-label">Price</span>
<span class="main-info-value">${typeof price === 'number' ? '$'+price.toFixed(2) : price}</span>
</div>
<div class="main-info-item">
<span class="main-info-label">Market Cap</span>
<span class="main-info-value">${marketCap}</span>
</div>
</div>
<!-- PE Cards (3 mini cards) -->
<div class="mini-cards">
<div class="mini-card">
<div class="mini-card-label">P/E</div>
<div class="mini-card-value">${pe}</div>
</div>
<div class="mini-card">
<div class="mini-card-label">FWD P/E</div>
<div class="mini-card-value">${fwdPe}</div>
</div>
<div class="mini-card">
<div class="mini-card-label">PEG</div>
<div class="mini-card-value">${peg}</div>
</div>
</div>
<!-- Financials Condensed Table -->
<table class="metrics-table">
<tr><td>Revenue</td><td>${revenue}</td></tr>
<tr><td>Net Income</td><td>${netIncome}</td></tr>
<tr><td>Revenue Growth</td><td class="${parsePercent(revGrowth) >= 0 ? 'positive' : 'negative'}">${revGrowth}</td></tr>
<tr><td>Earnings Growth</td><td class="${parsePercent(earnGrowth) >= 0 ? 'positive' : 'negative'}">${earnGrowth}</td></tr>
</table>
<!-- Other Metrics in Condensed Table -->
<table class="metrics-table">
${metricsRows}
</table>
</div>
`;
document.getElementById('financialData').innerHTML = html;
}
// Update News
function updateNews(data) {
const container = document.getElementById('newsContainer');
const news = data.recent_news || [];
if (!news.length) {
container.innerHTML = `
<div class="news-container">
<div class="news-header">Recent News</div>
<div style="padding: 20px; color: var(--text-secondary); text-align: center;">No recent news available</div>
</div>
`;
return;
}
const newsHtml = news.slice(0, 8).map(item => `
<div class="news-item" onclick="window.open('${item.source_url || '#'}', '_blank')">
<div class="news-title">${item.title}</div>
<div class="news-summary">${item.summary || ''}</div>
<div class="news-meta">
<span class="news-source">${item.provider || 'Unknown'}</span>
<span>${item.pubDate ? new Date(item.pubDate).toLocaleDateString() : ''}</span>
</div>
</div>
`).join('');
container.innerHTML = `
<div class="news-container">
<div class="news-header">Recent News • ${data.ticker}</div>
${newsHtml}
</div>
`;
}
// Search functionality - FRESH FETCH FOR WATCHLIST
document.getElementById('searchInput').addEventListener('keypress', async (e) => {
if (e.key === 'Enter') {
const ticker = e.target.value.toUpperCase().trim();
if (!ticker) return;
// Skip if already in watchlist AND we have fresh data (< 30 sec old)
if (state.watchlist.has(ticker) && state.data[ticker]?.lastUpdated) {
const age = Date.now() - state.data[ticker].lastUpdated;
if (age < 30000) {
selectTicker(ticker);
e.target.value = '';
return;
}
}
// Always fetch fresh data from API for watchlist additions
try {
const response = await fetch(`${API_BASE}/ticker?ticker=${ticker}`);
if (!response.ok) throw new Error('API error');
const data = await response.json();
if (Array.isArray(data) && data[0]) {
// Add timestamp for freshness tracking
data[0].lastUpdated = Date.now();
state.data[ticker] = data[0];
// Add to watchlist memory if not already present
if (!state.watchlist.has(ticker)) {
state.watchlist.add(ticker);
state.sections['Watchlist'].expanded = true;
renderSections();
}
selectTicker(ticker);
e.target.value = '';
} else {
throw new Error('Invalid response');
}
} catch (err) {
console.error('Search failed:', err);
alert(`Could not load ticker: ${ticker}`);
}
}
});
// Auto refresh every 60 seconds
setInterval(() => {
state.cache.clear();
const promises = [];
Object.entries(state.sections).forEach(([name, section]) => {
if (section.loaded && !section.isWatchlist) {
promises.push(loadSection(name));
}
});
if (state.watchlist.size > 0) {
promises.push(fetchWithCache(`${API_BASE}/ticker?ticker=${Array.from(state.watchlist).join(',')}`).then(data => {
if (Array.isArray(data)) {
data.forEach(d => {
if (d.ticker) state.data[d.ticker] = d;
});
}
}).catch(() => {}));
}
Promise.all(promises).then(() => {
renderTickerTape();
renderSections();
if (state.selectedTicker && state.data[state.selectedTicker]) {
selectTicker(state.selectedTicker);
}
});
}, 60000);
// Initialize
init();
</script>
</body>
</html>
